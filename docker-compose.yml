version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-1
      - api-2

  api-1:
    build:
      context: .
      dockerfile: BankingDemo.API/Dockerfile
    environment:
      - ConnectionStrings__Default=Host=db;Port=5432;Database=bankingdemodb;Username=admin;Password=zxcvasdfwqer
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  api-2:
    build:
      context: .
      dockerfile: BankingDemo.API/Dockerfile
    environment:
      - ConnectionStrings__Default=Host=db;Port=5432;Database=bankingdemodb;Username=admin;Password=zxcvasdfwqer
      - ASPNETCORE_ENVIRONMENT=Development 
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=zxcvasdfwqer
      - POSTGRES_DB=bankingdemodb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bankingdemodb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: